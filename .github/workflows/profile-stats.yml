name: profile stats

on:
  schedule:
    - cron: "0 9 * * *"   # todo dia ~06:00 (horário de Brasília)
  workflow_dispatch:        # botão "Run workflow" manual
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Atualizar estatísticas
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python scripts/update_stats.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md cache/loc_cache.json
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "chore: atualiza métricas do perfil"
            git push
          fi
